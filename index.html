<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Endless Highway - Cyber Drive</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
            pointer-events: none;
            z-index: 10;
        }
        #score-container {
            display: flex;
            flex-direction: column;
            margin-bottom: 10px;
        }
        #score {
            font-size: 38px;
            font-weight: 900;
            color: #ffde00;
        }
        #highscore {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            opacity: 0.8;
            margin-bottom: 10px;
        }
        #multiplier {
            display: none;
            color: #ff5500;
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 10px;
            animation: pulse 0.5s infinite alternate;
        }
        @keyframes pulse {
            from { transform: scale(1); text-shadow: 0 0 10px #ff5500; }
            to { transform: scale(1.1); text-shadow: 0 0 20px #ffea00; }
        }
        #instructions {
            font-size: 14px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            line-height: 1.5;
        }
        #speedometer {
            position: absolute;
            bottom: 30px;
            right: 30px;
            color: #00ffff;
            text-align: right;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8), 2px 2px 4px rgba(0,0,0,0.9);
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
        #speed-val {
            font-size: 64px;
            font-weight: 900;
            line-height: 0.8;
        }
        #speed-unit {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            opacity: 0.8;
        }
        #gameover {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #ff4444;
            color: #ff4444;
            font-size: 48px;
            font-weight: 900;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
            display: none;
            text-align: center;
            backdrop-filter: blur(10px);
            z-index: 20;
        }
        #gameover-score {
            color: white;
            font-size: 24px;
            margin-top: 10px;
            text-shadow: none;
        }
        .restart-btn {
            margin-top: 25px;
            padding: 12px 30px;
            font-size: 22px;
            font-weight: bold;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            pointer-events: auto;
            transition: 0.2s;
            text-transform: uppercase;
        }
        .restart-btn:hover {
            background: #059669;
            transform: scale(1.05);
        }
        @keyframes coinCollect {
            0% { transform: scale(1); color: #ffde00; }
            50% { transform: scale(1.2); color: #fff; }
            100% { transform: scale(1); color: #ffde00; }
        }
        .score-bump { animation: coinCollect 0.3s ease; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <div id="score-container">
            <div id="score">Skor: 0</div>
            <div id="highscore">En Yüksek: 0</div>
            <div id="multiplier">🔥 2X HIZ BONUSU!</div>
        </div>
        <div id="instructions">
            <b>KONTROLLER:</b><br>
            ⬅️ / ➡️ : Şerit Değiştir<br>
            ⬆️ / W : Gaz (Hızlan)<br>
            ⬇️ / S : Fren (Yavaşla)<br>
            📷 V Tuşu : Kamera (İç/Dış)<br>
            🟡 Altınlar : +50 Puan
        </div>
    </div>
    
    <div id="speedometer">
        <div id="speed-val">60</div>
        <div id="speed-unit">KM/H</div>
    </div>

    <div id="gameover">
        KAZA YAPTIN!
        <div id="gameover-score"></div>
        <button class="restart-btn" onclick="location.reload()">Tekrar Oyna</button>
    </div>

    <script>
        // --- HIGH SCORE ---
        let bestScore = localStorage.getItem('endlessHighScore') || 0;
        document.getElementById('highscore').innerText = "En Yüksek: " + bestScore;

        // --- SAHNE VE KAMERA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        scene.fog = new THREE.Fog(0x87CEEB, 30, 150); 

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
        let baseFov = 60; 
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; 
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- AYDINLATMA ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(-20, 50, -20);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 150;
        dirLight.shadow.camera.left = -50;
        dirLight.shadow.camera.right = 50;
        dirLight.shadow.camera.top = 50;
        dirLight.shadow.camera.bottom = -50;
        scene.add(dirLight);

        // --- ÇEVRE ---
        const grassGeo = new THREE.PlaneGeometry(200, 400);
        const grassMat = new THREE.MeshStandardMaterial({ color: 0x4CAF50 });
        const grass = new THREE.Mesh(grassGeo, grassMat);
        grass.rotation.x = -Math.PI / 2;
        grass.receiveShadow = true;
        scene.add(grass);

        const roadWidth = 12;
        const roadGeo = new THREE.PlaneGeometry(roadWidth, 400);
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x2b2b2b, roughness: 0.9 }); 
        const road = new THREE.Mesh(roadGeo, roadMat);
        road.rotation.x = -Math.PI / 2;
        road.position.y = 0.01; 
        road.receiveShadow = true;
        scene.add(road);

        const lines = [];
        const lineGeo = new THREE.PlaneGeometry(0.2, 3);
        const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        for (let i = 0; i < 20; i++) {
            let line1 = new THREE.Mesh(lineGeo, lineMat);
            line1.rotation.x = -Math.PI / 2;
            line1.position.set(-roadWidth / 6, 0.02, -i * 10);
            scene.add(line1);
            lines.push(line1);

            let line2 = new THREE.Mesh(lineGeo, lineMat);
            line2.rotation.x = -Math.PI / 2;
            line2.position.set(roadWidth / 6, 0.02, -i * 10);
            scene.add(line2);
            lines.push(line2);
        }

        const trees = [];
        function createTree() {
            const treeGroup = new THREE.Group();
            const trunkGeo = new THREE.CylinderGeometry(0.4, 0.6, 2, 8);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5c4033 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = 1;
            trunk.castShadow = true;
            treeGroup.add(trunk);

            const leavesGeo = new THREE.ConeGeometry(2.5, 5, 8);
            const leavesMat = new THREE.MeshStandardMaterial({ color: 0x2e8b57 });
            const leaves = new THREE.Mesh(leavesGeo, leavesMat);
            leaves.position.y = 3.5;
            leaves.castShadow = true;
            treeGroup.add(leaves);
            return treeGroup;
        }

        function spawnTree(startZ) {
            const tree = createTree();
            const isLeft = Math.random() > 0.5;
            const xPos = isLeft ? -roadWidth/2 - 3 - Math.random() * 20 : roadWidth/2 + 3 + Math.random() * 20;
            const scale = 0.8 + Math.random() * 0.6;
            tree.scale.set(scale, scale, scale);
            tree.position.set(xPos, 0, startZ || -150); 
            scene.add(tree);
            trees.push(tree);
        }
        for (let z = -150; z < 20; z += 15) {
            if (Math.random() > 0.2) spawnTree(z); 
        }

        const particleCount = 150;
        const particlesGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for(let i=0; i < particleCount * 3; i+=3) {
            positions[i] = (Math.random() - 0.5) * 30; 
            positions[i+1] = Math.random() * 10;       
            positions[i+2] = -Math.random() * 150;     
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleMat = new THREE.PointsMaterial({color: 0xffffff, size: 0.1, transparent: true, opacity: 0.6});
        const speedParticles = new THREE.Points(particlesGeo, particleMat);
        scene.add(speedParticles);

        // --- GELİŞTİRİLMİŞ, HATASIZ ARAÇ TASARIMI ---
        let playerTaillightMat;
        let playerExhausts = [];
        let steeringWheel; 

        function createCar(colorStr, isPlayer = false) {
            const carGroup = new THREE.Group();
            const carMat = new THREE.MeshStandardMaterial({ color: colorStr, metalness: 0.3, roughness: 0.4 });
            const blackMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
            
            // 1. Ana Gövde (Daha aerodinamik ve düz)
            const bodyGeo = new THREE.BoxGeometry(1.9, 0.4, 4.0);
            const body = new THREE.Mesh(bodyGeo, carMat);
            body.position.y = 0.4;
            body.castShadow = true;
            body.receiveShadow = true;
            carGroup.add(body);

            // 2. Kabin (Camlar) - Kamera çarpışmasını önlemek için ayrı
            const cabinGeo = new THREE.BoxGeometry(1.4, 0.4, 2.0);
            const cabin = new THREE.Mesh(cabinGeo, blackMat); // Siyah cam görünümü
            cabin.position.set(0, 0.8, 0.2); 
            cabin.castShadow = true;
            carGroup.add(cabin);

            // Eğer bu oyuncu arabasıysa, kabini referans olarak saklıyoruz (İç kamerada gizlemek için)
            if (isPlayer) {
                carGroup.userData.cabin = cabin;
            }

            // Farlar
            const headlightGeo = new THREE.BoxGeometry(0.4, 0.1, 0.1);
            const headlightMat = new THREE.MeshBasicMaterial({ color: 0xffffee });
            const hl1 = new THREE.Mesh(headlightGeo, headlightMat);
            hl1.position.set(-0.6, 0.45, -2.01);
            const hl2 = new THREE.Mesh(headlightGeo, headlightMat);
            hl2.position.set(0.6, 0.45, -2.01);
            carGroup.add(hl1, hl2);

            // Stop Lambaları
            const taillightMat = new THREE.MeshBasicMaterial({ color: 0x880000 }); 
            if(isPlayer) playerTaillightMat = taillightMat; 
            const tl1 = new THREE.Mesh(headlightGeo, taillightMat);
            tl1.position.set(-0.6, 0.45, 2.01);
            const tl2 = new THREE.Mesh(headlightGeo, taillightMat);
            tl2.position.set(0.6, 0.45, 2.01);
            carGroup.add(tl1, tl2);

            if (isPlayer) {
                // Rüzgarlık (Spoiler)
                const spoilerWingGeo = new THREE.BoxGeometry(1.8, 0.1, 0.4);
                const spoilerWing = new THREE.Mesh(spoilerWingGeo, blackMat);
                spoilerWing.position.set(0, 0.9, 1.8);
                spoilerWing.castShadow = true;
                
                const spoilerLegGeo = new THREE.BoxGeometry(0.1, 0.3, 0.2);
                const sl1 = new THREE.Mesh(spoilerLegGeo, blackMat);
                sl1.position.set(-0.6, 0.7, 1.8);
                const sl2 = new THREE.Mesh(spoilerLegGeo, blackMat);
                sl2.position.set(0.6, 0.7, 1.8);
                carGroup.add(spoilerWing, sl1, sl2);

                // Nitro Alevleri
                const exhaustGeo = new THREE.ConeGeometry(0.15, 0.8, 8);
                exhaustGeo.rotateX(Math.PI / 2);
                const exhaustMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.9 });
                
                const ex1 = new THREE.Mesh(exhaustGeo, exhaustMat);
                ex1.position.set(-0.5, 0.3, 2.3);
                ex1.visible = false;
                const ex2 = new THREE.Mesh(exhaustGeo, exhaustMat);
                ex2.position.set(0.5, 0.3, 2.3);
                ex2.visible = false;
                
                carGroup.add(ex1, ex2);
                playerExhausts.push(ex1, ex2);

                // DİREKSİYON (Artık arabanın içinde mükemmel konumda)
                const steeringGeo = new THREE.TorusGeometry(0.25, 0.04, 8, 24);
                const steeringMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
                steeringWheel = new THREE.Mesh(steeringGeo, steeringMat);
                steeringWheel.position.set(-0.4, 0.85, -0.4); 
                steeringWheel.rotation.x = -Math.PI / 6; 
                
                const hubGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.1, 16);
                const hub = new THREE.Mesh(hubGeo, steeringMat);
                hub.rotation.x = Math.PI / 2;
                steeringWheel.add(hub);
                
                carGroup.add(steeringWheel);
            }

            // Tekerlekler
            const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.2, 16);
            const tireMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
            const rimGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.21, 8);
            const rimMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.8 });

            const wheelPositions = [
                [-1.0, 0.35, 1.2], [1.0, 0.35, 1.2],   
                [-1.0, 0.35, -1.3], [1.0, 0.35, -1.3]  
            ];
            wheelPositions.forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeo, tireMat);
                const rim = new THREE.Mesh(rimGeo, rimMat);
                wheel.add(rim); 
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(...pos);
                wheel.castShadow = true;
                carGroup.add(wheel);
            });

            if (isPlayer) {
                const headLight1 = new THREE.PointLight(0xffffff, 1.5, 30);
                headLight1.position.set(-0.6, 0.5, -2.1);
                carGroup.add(headLight1);
                const headLight2 = new THREE.PointLight(0xffffff, 1.5, 30);
                headLight2.position.set(0.6, 0.5, -2.1);
                carGroup.add(headLight2);
            }
            return carGroup;
        }

        const coins = [];
        const coinGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.1, 16);
        coinGeo.rotateX(Math.PI / 2); 
        const coinMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.8, roughness: 0.2 });

        function spawnCoin(laneX, startZ) {
            const coin = new THREE.Mesh(coinGeo, coinMat);
            coin.position.set(laneX, 0.5, startZ);
            coin.castShadow = true;
            scene.add(coin);
            coins.push(coin);
        }

        // --- OYUN DEĞİŞKENLERİ ---
        const playerCar = createCar(0xff3333, true); 
        scene.add(playerCar);

        const lanes = [-roadWidth/3, 0, roadWidth/3]; 
        let currentLane = 1; 
        playerCar.position.set(lanes[currentLane], 0, 0);

        // DAHA MANTIKLI, OTURAKLI İVMELENME
        let baseSpeed = 1.0;     // 60 km/h taban hız
        let currentSpeed = 1.0;  
        let maxSpeed = 3.35;     // 200 km/h hız limiti
        let accelerationRate = 0.005; // ÇOK DAHA YAVAŞ, MANTIKLI HIZLANMA (Eskiden 0.015'ti)

        let isAccelerating = false;
        let isBraking = false;

        let score = 0;
        let isGameOver = false;
        let isFirstPerson = false; 
        const trafficCars = [];

        function spawnTrafficCar() {
            const colors = [0x3344ff, 0x22cc22, 0xffaa00, 0x888888, 0xffffff, 0x550055];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            const tCar = createCar(randomColor, false);
            
            const randomLane = Math.floor(Math.random() * 3);
            const startZ = -120 - Math.random() * 20; 
            tCar.position.set(lanes[randomLane], 0, startZ); 
            tCar.rotation.y = Math.PI; 
            scene.add(tCar);
            trafficCars.push({ mesh: tCar, lane: randomLane });

            if (Math.random() > 0.5) {
                let coinLane;
                do { coinLane = Math.floor(Math.random() * 3); } while (coinLane === randomLane); 
                spawnCoin(lanes[coinLane], startZ + (Math.random() * 10 - 5));
            }
        }

        for(let i=0; i<3; i++) { setTimeout(spawnTrafficCar, i * 1500); }
        let spawnTimer = 0;

        function updateScoreDisplay() {
            const scoreEl = document.getElementById('score');
            scoreEl.innerText = "Skor: " + score;
            scoreEl.classList.remove('score-bump');
            void scoreEl.offsetWidth; 
            scoreEl.classList.add('score-bump');
        }

        // --- KONTROLLER ---
        window.addEventListener('keydown', (e) => {
            if (isGameOver) return;
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                if (currentLane > 0) currentLane--;
            } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                if (currentLane < 2) currentLane++;
            } else if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
                isAccelerating = true;
            } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
                isBraking = true;
            } else if (e.key === 'v' || e.key === 'V') {
                isFirstPerson = !isFirstPerson; 
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
                isAccelerating = false;
            } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
                isBraking = false;
            }
        });

        // --- OYUN DÖNGÜSÜ ---
        function animate() {
            if (isGameOver) return;
            requestAnimationFrame(animate);

            // --- FİZİK VE HIZLANMA ---
            if (isAccelerating) {
                // Logaritmik yavaşlayan mükemmel ivme eğrisi
                let currentAccel = accelerationRate * (1 - (currentSpeed / (maxSpeed * 1.1)));
                currentSpeed += currentAccel;
                
                if (currentSpeed > maxSpeed) currentSpeed = maxSpeed; 
                baseFov = 60 + (currentSpeed - 1.0) * 8; 
                
                playerExhausts.forEach(ex => {
                    ex.visible = true;
                    ex.scale.z = 1 + Math.random() * 0.8; 
                    ex.material.color.setHex(Math.random() > 0.5 ? 0xff5500 : 0xffaa00);
                });
            } else if (isBraking) {
                currentSpeed -= 0.03; // Yumuşatılmış fren
                if (currentSpeed < baseSpeed * 0.5) currentSpeed = baseSpeed * 0.5; 
                baseFov = 50; 
                playerTaillightMat.color.setHex(0xff0000); 
                playerExhausts.forEach(ex => ex.visible = false);
            } else {
                currentSpeed += (baseSpeed - currentSpeed) * 0.01; // Gaza basılmıyorsa yavaşça süzül (Coasting)
                baseFov = 60;
                playerTaillightMat.color.setHex(0x880000); 
                playerExhausts.forEach(ex => ex.visible = false);
            }

            let displaySpeed = Math.min(200, Math.floor(currentSpeed * 60));
            document.getElementById('speed-val').innerText = displaySpeed;
            
            let isSpeedBonus = displaySpeed > 150;
            document.getElementById('multiplier').style.display = isSpeedBonus ? 'block' : 'none';

            camera.fov += (baseFov - camera.fov) * 0.1;
            camera.updateProjectionMatrix();

            let shakeX = 0, shakeY = 0;
            if (isSpeedBonus && !isFirstPerson) {
                shakeX = (Math.random() - 0.5) * 0.08;
                shakeY = (Math.random() - 0.5) * 0.08;
            }

            // Sürüş Hissiyatı
            const targetX = lanes[currentLane];
            const diffX = targetX - playerCar.position.x;
            playerCar.position.x += diffX * 0.15; 
            playerCar.rotation.z = -diffX * 0.05; 
            playerCar.rotation.y = -diffX * 0.03;

            // DİREKSİYON HAREKETİ
            if (steeringWheel) {
                steeringWheel.rotation.z = -diffX * 0.8;
            }

            // Çevre akışı
            lines.forEach(line => {
                line.position.z += currentSpeed;
                if (line.position.z > 10) line.position.z -= 200;
            });

            const positionsArr = speedParticles.geometry.attributes.position.array;
            for(let i=2; i < particleCount * 3; i+=3) {
                positionsArr[i] += currentSpeed * 2.5; 
                if(positionsArr[i] > 10) positionsArr[i] -= 150;
            }
            speedParticles.geometry.attributes.position.needsUpdate = true;

            for (let i = trees.length - 1; i >= 0; i--) {
                let tree = trees[i];
                tree.position.z += currentSpeed;
                if (tree.position.z > 20) {
                    scene.remove(tree);
                    trees.splice(i, 1);
                }
            }
            if (Math.random() < 0.08 * currentSpeed) spawnTree(-150);

            // Altınlar
            for (let i = coins.length - 1; i >= 0; i--) {
                let coin = coins[i];
                coin.rotation.z += 0.1; 
                coin.position.z += currentSpeed;

                const distanceZ = Math.abs(playerCar.position.z - coin.position.z);
                const distanceX = Math.abs(playerCar.position.x - coin.position.x);
                if (distanceZ < 2.5 && distanceX < 1.5) {
                    scene.remove(coin);
                    coins.splice(i, 1);
                    score += isSpeedBonus ? 100 : 50; 
                    updateScoreDisplay();
                } else if (coin.position.z > 20) {
                    scene.remove(coin);
                    coins.splice(i, 1);
                }
            }

            // Trafik Araçları
            for (let i = trafficCars.length - 1; i >= 0; i--) {
                let tCar = trafficCars[i].mesh;
                tCar.position.z += currentSpeed * 0.6; 

                const distanceZ = Math.abs(playerCar.position.z - tCar.position.z);
                const distanceX = Math.abs(playerCar.position.x - tCar.position.x);
                
                if (distanceZ < 3.5 && distanceX < 1.5) {
                    isGameOver = true;
                    if (score > bestScore) localStorage.setItem('endlessHighScore', score);
                    document.getElementById('gameover-score').innerHTML = `Final Skor: ${score}<br>${score > bestScore ? '🎉 YENİ REKOR! 🎉' : ''}`;
                    document.getElementById('gameover').style.display = 'block';
                }

                if (tCar.position.z > 20) {
                    scene.remove(tCar);
                    trafficCars.splice(i, 1);
                    score += isSpeedBonus ? 20 : 10; 
                    updateScoreDisplay();
                    
                    if (baseSpeed < 1.8) { 
                        baseSpeed += 0.003; 
                    }
                }
            }

            spawnTimer++;
            let spawnLimit = Math.max(30, 90 - currentSpeed * 10);
            if (spawnTimer > spawnLimit) { 
                spawnTrafficCar();
                spawnTimer = 0;
            }

            // KAMERA YÖNETİMİ & KABİN GİZLEME (BUĞU / CLIPPING ÇÖZÜMÜ)
            if (isFirstPerson) {
                playerCar.userData.cabin.visible = false; // Görüşü kapatmamak için kabini gizle
                
                // Şoför koltuğu (solda, direksiyon arkasında)
                camera.position.set(playerCar.position.x - 0.4, 1.15 + shakeY, playerCar.position.z + 0.1);
                camera.lookAt(playerCar.position.x - 0.4, 1.1, playerCar.position.z - 50);
            } else {
                playerCar.userData.cabin.visible = true; // Dış kamerada kabini geri getir
                
                const targetCamX = playerCar.position.x;
                camera.position.x += (targetCamX - camera.position.x) * 0.1;
                
                const targetCamZ = playerCar.position.z + 10 + (currentSpeed * 1.5);
                camera.position.z += (targetCamZ - camera.position.z) * 0.1;
                camera.position.y = 4;
                
                camera.position.x += shakeX;
                camera.position.y += shakeY;
                
                camera.lookAt(playerCar.position.x, 0, playerCar.position.z - 20);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });

        animate();
    </script>
</body>
</html>
